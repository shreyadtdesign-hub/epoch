<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPOCH</title>

<link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --black: #0A0A0A;
    --cream: #F0EAE0;
    --gold: #C9A877;
    --gray: #6E6657;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
  }

  /* Main scrub track: tall scroll runway, video pinned inside it */
  .scrub-track {
    position: relative;
    height: 700vh;
  }

  .scrub-pin {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }

  .scrub-pin video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .generation-counter {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .generation-counter .label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
  }
</style>
</head>
<body>

<div class="scrub-track" id="lifeTrack">
  <div class="scrub-pin">
    <video id="lifeVideo" src="epoch-life.mp4" muted playsinline preload="auto"></video>
  </div>
</div>

<div class="generation-counter" id="generationCounter">
  <svg width="28" height="28" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="12" stroke="#C9A877" stroke-width="1.5" fill="none"/>
    <line id="hourHand" x1="14" y1="14" x2="14" y2="8" stroke="#C9A877" stroke-width="1.5" stroke-linecap="round"/>
    <line id="secondHand" x1="14" y1="14" x2="14" y2="5" stroke="#C9A877" stroke-width="1" stroke-linecap="round"/>
  </svg>
  <div class="label" id="generationLabel">GENERATION 01</div>
</div>

<script>
// LOOP LOGIC state (module scope, top of script)
let loopCount = 1;
let breakTriggered = false;
let breakRewindFloor = 0;

const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (reduced) {
  initStaticFallback();
} else {
  init();
}

function initStaticFallback() {
  // Reduced-motion fallback: full normal scroll, no GSAP, no scrub.
  // Stage sections / resolution section to be added in a later step.
  document.body.style.overflow = 'auto';
}

function init() {
  gsap.registerPlugin(ScrollTrigger);

  const lenis = new Lenis();
  gsap.ticker.add((time) => lenis.raf(time * 1000));
  gsap.ticker.lagSmoothing(0);

  const track = document.getElementById('lifeTrack');
  const video = document.getElementById('lifeVideo');
  const generationLabel = document.getElementById('generationLabel');

  let duration = 0;
  video.addEventListener('loadedmetadata', () => {
    duration = video.duration;
  });

  function scrubLife() {
    if (!duration) return;

    const rect = track.getBoundingClientRect();
    const total = rect.height - window.innerHeight;
    const progress = Math.min(Math.max(-rect.top, 0), total) / total;

    video.currentTime = progress * duration;
  }

  function updateGenerationLabel() {
    generationLabel.textContent = 'GENERATION 0' + loopCount;
  }

  let lastScroll = lenis.scroll;

  function handleSeam(e) {
    const scroll = e.scroll;
    const limit = e.limit;

    // SEAM — scrolling down past the end
    if (e.direction === 1 && lastScroll < limit && scroll >= limit && !breakTriggered) {
      loopCount += 1;
      updateGenerationLabel();
      // BREAK (loopCount === 2) is not implemented yet — always loop for now.
      lenis.scrollTo(1, { immediate: true });
      lastScroll = 1;
      return;
    }

    // SEAM — scrolling up past the start
    if (e.direction === -1 && lastScroll > breakRewindFloor && scroll <= breakRewindFloor) {
      if (breakTriggered) {
        // hard floor, do nothing further
      } else if (loopCount > 1) {
        loopCount -= 1;
        updateGenerationLabel();
        lenis.scrollTo(limit - 1, { immediate: true });
        lastScroll = limit - 1;
        return;
      }
      // loopCount === 1: do nothing, floor
    }

    lastScroll = scroll;
  }

  lenis.on('scroll', (e) => {
    ScrollTrigger.update();
    handleSeam(e);
  });

  ScrollTrigger.create({
    trigger: track,
    start: 'top top',
    end: 'bottom bottom',
    onUpdate: scrubLife,
    onRefresh: scrubLife
  });

  initGenerationClock();
  ScrollTrigger.refresh();
}

function initGenerationClock() {
  const secondHand = document.getElementById('secondHand');

  function tick() {
    const seconds = new Date().getSeconds();
    secondHand.setAttribute('transform', `rotate(${seconds * 6} 14 14)`);
  }

  tick();
  setInterval(tick, 1000);
}
</script>

</body>
</html>
